# Small-N extension to the benchmark archive for Figure 2 small-N rerun.
#
# Adds N ∈ {500, 5000, 50000} cells alongside the existing
# N ∈ {1000, 10000, 100000} cells in archive_full.yaml. Same M / correlation
# / f / seed grid, so the deterministic tuning-vs-test split is consistent
# across the full Fig 2 curve.
#
# Grid: 3 (N) * 3 (M) * 4 (corr) * 5 (f) * 50 (seeds) = 180 cells * 50 = 9 000 new instances.
# Pairs with the existing 9 000 instances → 18 000 total, 70/30 tuning/test
# (12 600 test post-split). Used to regenerate `average_computation_time.pdf`
# under the pinned-archive provenance.
N: [500, 5000, 50000]
M: [5, 10, 20]
correlation: [uncorrelated, weakly, strongly, inversely_strongly]
f: [0.1, 0.25, 0.5, 0.75, 0.9]
