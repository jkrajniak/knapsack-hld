name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (locked)
        run: uv sync --locked --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Run tests (pytest)
        run: uv run python -m pytest -q

      - name: Smoke archive — generate
        run: |
          uv run python scripts/generate_instances.py \
            --config scripts/configs/archive_smoke.yaml \
            --out instances --jobs 2

      - name: Smoke archive — verify integrity
        run: uv run python scripts/verify_instances.py --archive instances
